<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>localflow</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: #121212; color: #e8e8e8;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100%;
  }
  body {
    display: flex; flex-direction: column; align-items: center;
    padding: 24px 16px 48px;
    gap: 20px;
  }
  h1 {
    font-size: 1.1rem; font-weight: 500; letter-spacing: 0.02em;
    color: #999; margin: 8px 0 0;
  }
  #recordBtn {
    width: 140px; height: 140px;
    border-radius: 50%;
    border: none;
    background: #d64545;
    color: #fff;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 0 0 0 rgba(214, 69, 69, 0.5);
    transition: background 0.15s ease, transform 0.1s ease;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  #recordBtn:active { transform: scale(0.96); }
  #recordBtn.recording {
    background: #b02f2f;
    animation: pulse 1.4s infinite;
  }
  #recordBtn.busy {
    background: #444;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(214, 69, 69, 0.55); }
    70% { box-shadow: 0 0 0 22px rgba(214, 69, 69, 0); }
    100% { box-shadow: 0 0 0 0 rgba(214, 69, 69, 0); }
  }
  #status { min-height: 1.4em; color: #aaa; font-size: 0.95rem; }
  #error {
    display: none;
    color: #ff8a8a;
    background: #3a1e1e;
    border: 1px solid #6b2b2b;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.9rem;
    max-width: 480px;
    width: 100%;
  }
  .spinner {
    width: 22px; height: 22px;
    border: 3px solid #444;
    border-top-color: #d64545;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: inline-block;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #list {
    width: 100%;
    max-width: 480px;
    display: flex; flex-direction: column;
    gap: 10px;
  }
  .item {
    background: #1c1c1c;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    padding: 12px 14px;
  }
  .item .meta {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 0.75rem; color: #777; margin-bottom: 6px;
  }
  .item .text {
    white-space: pre-wrap; word-wrap: break-word;
    font-size: 0.95rem; line-height: 1.4;
  }
  .copyBtn {
    background: #2a2a2a;
    color: #ddd;
    border: 1px solid #3a3a3a;
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 0.8rem;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .copyBtn:active { background: #3a3a3a; }
  .copyBtn.copied { color: #7ee0a8; border-color: #2f5a41; }
  #cleanToggle {
    display: flex; align-items: center; gap: 8px;
    font-size: 0.85rem; color: #aaa;
  }
  footer {
    margin-top: auto;
    padding-top: 24px;
    font-size: 0.72rem;
    color: #666;
    text-align: center;
    max-width: 480px;
  }
</style>
</head>
<body>
  <h1>localflow</h1>

  <button id="recordBtn">Record</button>

  <label id="cleanToggle">
    <input type="checkbox" id="cleanCheckbox" checked>
    clean up with Ollama
  </label>

  <div id="status"></div>
  <div id="error"></div>

  <div id="list"></div>

  <footer>
    Mic access requires HTTPS or localhost. To use this from your phone over
    Tailscale, run <code>tailscale serve 8756</code> and open the printed
    https:// URL.
  </footer>

<script>
  const recordBtn = document.getElementById('recordBtn');
  const statusEl = document.getElementById('status');
  const errorEl = document.getElementById('error');
  const listEl = document.getElementById('list');
  const cleanCheckbox = document.getElementById('cleanCheckbox');

  let mediaRecorder = null;
  let chunks = [];
  let stream = null;
  let recording = false;
  let busy = false;

  function showError(msg) {
    errorEl.textContent = msg;
    errorEl.style.display = 'block';
  }

  function clearError() {
    errorEl.style.display = 'none';
    errorEl.textContent = '';
  }

  function pickMimeType() {
    const candidates = [
      'audio/webm;codecs=opus',
      'audio/webm',
      'audio/ogg;codecs=opus',
      'audio/ogg',
      'audio/mp4',
    ];
    for (const type of candidates) {
      if (window.MediaRecorder && MediaRecorder.isTypeSupported(type)) {
        return type;
      }
    }
    return '';
  }

  function setBusy(isBusy) {
    busy = isBusy;
    recordBtn.classList.toggle('busy', isBusy);
    recordBtn.disabled = isBusy;
  }

  async function startRecording() {
    clearError();
    try {
      stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (err) {
      showError('Microphone access failed: ' + err.message);
      return;
    }
    const mimeType = pickMimeType();
    try {
      mediaRecorder = mimeType
        ? new MediaRecorder(stream, { mimeType })
        : new MediaRecorder(stream);
    } catch (err) {
      showError('Recording not supported: ' + err.message);
      return;
    }
    chunks = [];
    mediaRecorder.ondataavailable = (e) => {
      if (e.data && e.data.size > 0) chunks.push(e.data);
    };
    mediaRecorder.onstop = onRecordingStopped;
    mediaRecorder.start();
    recording = true;
    recordBtn.textContent = 'Stop';
    recordBtn.classList.add('recording');
    statusEl.textContent = 'recording…';
  }

  function stopRecording() {
    if (mediaRecorder && recording) {
      mediaRecorder.stop();
    }
    if (stream) {
      stream.getTracks().forEach((t) => t.stop());
    }
    recording = false;
    recordBtn.classList.remove('recording');
    recordBtn.textContent = 'Record';
  }

  async function onRecordingStopped() {
    const mimeType = mediaRecorder.mimeType || 'audio/webm';
    const blob = new Blob(chunks, { type: mimeType });
    if (blob.size === 0) {
      statusEl.textContent = '';
      return;
    }
    setBusy(true);
    statusEl.innerHTML = '<span class="spinner"></span>transcribing…';
    try {
      const ext = mimeType.includes('ogg') ? 'ogg' : mimeType.includes('mp4') ? 'm4a' : 'webm';
      const form = new FormData();
      form.append('file', blob, 'recording.' + ext);
      const clean = cleanCheckbox.checked ? 1 : 0;
      const resp = await fetch('/transcribe?clean=' + clean, {
        method: 'POST',
        body: form,
      });
      if (!resp.ok) {
        let detail = resp.statusText;
        try {
          const j = await resp.json();
          if (j.detail) detail = j.detail;
        } catch (_) {}
        throw new Error(detail);
      }
      const data = await resp.json();
      addTranscript(data.text, data.ms);
      clearError();
    } catch (err) {
      showError('Transcription failed: ' + err.message);
    } finally {
      setBusy(false);
      statusEl.textContent = '';
    }
  }

  function addTranscript(text, ms) {
    const item = document.createElement('div');
    item.className = 'item';

    const meta = document.createElement('div');
    meta.className = 'meta';
    const time = document.createElement('span');
    time.textContent = new Date().toLocaleTimeString() + ' · ' + ms + 'ms';
    const copyBtn = document.createElement('button');
    copyBtn.className = 'copyBtn';
    copyBtn.textContent = 'copy';
    copyBtn.onclick = async () => {
      try {
        await navigator.clipboard.writeText(text);
        copyBtn.textContent = 'copied';
        copyBtn.classList.add('copied');
        setTimeout(() => {
          copyBtn.textContent = 'copy';
          copyBtn.classList.remove('copied');
        }, 1500);
      } catch (err) {
        showError('Copy failed: ' + err.message);
      }
    };
    meta.appendChild(time);
    meta.appendChild(copyBtn);

    const textEl = document.createElement('div');
    textEl.className = 'text';
    textEl.textContent = text || '(empty transcript)';

    item.appendChild(meta);
    item.appendChild(textEl);
    listEl.insertBefore(item, listEl.firstChild);
  }

  recordBtn.addEventListener('click', () => {
    if (busy) return;
    if (!recording) {
      startRecording();
    } else {
      stopRecording();
    }
  });
</script>
</body>
</html>
